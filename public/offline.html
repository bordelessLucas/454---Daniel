<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>Linq — Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f8fafc;
        --fg: #0f172a;
        --muted: #64748b;
        --primary: #1e3a8a;
        --card: #ffffff;
        --border: #e2e8f0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --fg: #f1f5f9;
          --muted: #94a3b8;
          --primary: #3b82f6;
          --card: #1e293b;
          --border: #334155;
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      main {
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(1.5rem, env(safe-area-inset-top)) 1.25rem max(1.5rem, env(safe-area-inset-bottom));
      }
      .card {
        width: min(100%, 24rem);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1.75rem 1.5rem;
        text-align: center;
      }
      img { width: 64px; height: 64px; object-fit: contain; margin: 0 auto 1rem; display: block; }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { margin: 0 0 1.25rem; color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
      button {
        appearance: none;
        border: 0;
        border-radius: 0.5rem;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
        padding: 0.7rem 1.1rem;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <img src="/icons/icon-192x192.png" alt="Linq" width="64" height="64" />
        <h1>Sem conexão</h1>
        <p>O Linq precisa de internet para carregar esta página. Verifique a conexão e tente novamente.</p>
        <button type="button" onclick="location.reload()">Tentar novamente</button>
      </div>
    </main>
  </body>
</html>
